<body>
  <header>
    <h1>Crocs & Kits</h1>
    <nav>
      <a href="#crocs">Crocs</a>
      <a href="#jerseys">Football Jerseys</a>
    </nav>
  </header>

  <!-- Hero with Pinterest background -->
  <section class="hero-section">
    <iframe src="https://assets.pinterest.com/ext/embed.html?id=16677461116431370"
            frameborder="0" scrolling="no"></iframe>
    <div class="hero-overlay"></div>
    <div class="hero-text">
      <h1 class="hero-title">Step into Comfort. Play with Pride.</h1>
    </div>
  </section>

  <!-- Crocs Section -->
  <main id="crocs">
    <h2>Crocs Collection</h2>
    <div class="product-grid">
      <div class="product-card">
        <img src="image/1.png" alt="BAPE Purple Crocs">
        <h3>BAPE PURPLE CROCS</h3>
        <p>Price: $450</p>
        <p class="sizes">Sizes: 3, 4, 5, 6, 7, 8</p>
        <button>Add to Cart</button>
      </div>
      <!-- Repeat for all Crocs -->
    </div>
  </main>

  <!-- Jerseys Section -->
  <main id="jerseys">
    <h2>Football Jerseys</h2>
    <div class="product-grid">
      <div class="product-card">
        <img src="image/1.png" alt="Manchester United Red Jersey">
        <h3>Manchester United RED JERSEY</h3>
        <p>Price: $350</p>
        <p class="sizes">Sizes: Small, Medium, Large, X-Large</p>
        <button>Add to Cart</button>
      </div>
      <!-- Repeat for all Jerseys -->
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Crocs & Kits. All rights reserved.</p>
  </footer>
</body>
