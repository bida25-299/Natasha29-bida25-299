<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crocs & Kits Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Crocs & Kits</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Crocs</a>
      <a href="#">Football Jerseys</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <!-- Hero section -->
  <section class="hero-section">
    <div class="hero-overlay"></div>
    <div class="hero-text">
      <h1 class="hero-title">Step into Comfort</h1>
      <p class="hero-subtitle">Play with Pride</p>
      <button>Shop Now</button>
    </div>
  </section>

  <!-- Example HTML usage goes here -->
  <main>
    <h2>Football Jerseys</h2>
    <div class="product-grid">
      <div class="product-card">
        <img src="image/1.png" alt="Manchester United Red Jersey">
        <h3>Manchester United RED JERSEY</h3>
        <p>Price: $350</p>
        <button>Add to Cart</button>
      </div>
      <!-- Repeat for other jerseys -->
    </div>

    <h2>Crocs Collection</h2>
    <div class="product-grid">
      <div class="product-card">
        <img src="image/1.png" alt="BAPE Purple Crocs">
        <h3>BAPE PURPLE CROCS</h3>
        <p>Price: $450</p>
        <button>Add to Cart</button>
      </div>
      <!-- Repeat for other crocs -->
    </div>
  </main>

  <!-- Pinterest inspiration -->
  <section class="inspiration">
    <h2>Style Inspiration</h2>
    <iframe src="https://assets.pinterest.com/ext/embed.html?id=16677461116431370"
            height="532" width="345" frameborder="0" scrolling="no"></iframe>
    <iframe src="https://assets.pinterest.com/ext/embed.html?id=591730838581052073"
            height="714" width="345" frameborder="0" scrolling="no"></iframe>
  </section>

  <footer>
    <p>&copy; 2026 Crocs & Kits. All rights reserved.</p>
  </footer>
</body>
</html>
