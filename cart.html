<!DOCTYPE html>
<html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Add to cart</title>
   
<style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
/* HEADER + NAVBAR */
        header {
            background: #333;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
 
        header h1{
            margin:0;
        }
 
        nav  {
            display: flex;
            gap: 20px;
        }
 
        nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
            font-weight: bold;
        }
 
        nav a:hover{
            color:aquamarine;
        }
 
/*MAIN LAYOUT */
        .container {
            display: flex;
            min-height: 100vh;
        }
 
        /* SIDEBAR */
        .sidebar {
            width: 220px;
            background: #f2f2f2;
            padding: 20px;
}
 
        .sidebar a {
            display: block;
            margin-bottom: 10px;
            color: #333;
            text-decoration: none;
        }
 
        .sidebar a:hover{
             color:aquamarine;
        }
 
/* MAIN CONTENT */
        .content {
            flex: 1;
            padding: 20px;
        }
 
        .content h1 {
             margin-top: 0;
        }
       
/*NEW FLEX SECTION */
        .main-section {
            display: flex;
            gap: 40px;
        }
 
        /*PRODUCTS*/
        .products-section{
            flex:2;
        }
 
        .product {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ccc;
            padding: 10px 0;
        }
 
        .price {
            font-weight: bold;
        }
/* CART SUMMARY */
        .cart-summary {
            margin-top: 30px;
            padding: 15px;
            background: #eee;
            width: 250px;
            border-radius: 8px;
        }
/*BUTTON */
        button {
            margin-top: 20px;
            padding: 10px 15px;
            background: #04855c;
            color: white;
            border: none;
            cursor: pointer;
        }
 
        button:hover {
            background: #555;
        }
    </style>
 
</head>
 
<body>
 
<header>
    <h1>Add to cart</h1>
 
      <nav>
        <a href="index.html">Home</a>
        <a href="crocs.html">crocs</a>
        <a href="football jerseys.html">football jerseys</a>
        <a href="about.html">about</a>
        <a href="contact.html">contact</a>
        <a href="feedback.html">feedback</a>
        <a href="cart.html">cart</a>
        
      </nav>
    </header>

            <button type="button" onclick="calculateCart()"> Add Selected to Cart</button>
        </div>
 
<!--RIGHT: CART SUMMARY -->
        <div class="cart-summary">
            <h3> Cart Summary</h3>
            <p id="items">Items selected: 0</p>
            <p id="total">Total:0</p>
         <ul id="cart-list"></ul>
        </div>
 <h3>Checkout</h3>

<form onsubmit="submitOrder(event)">
    <input type="text" id="name" placeholder="Full Name" required><br><br>

    <input type="text" id="phone" placeholder="Phone Number" required><br><br>

    <input type="text" id="address" placeholder="Delivery Address" required><br><br>

    <select id="payment" required>
        <option value="">Select Payment Method</option>
        <option value="cash">Cash on Delivery</option>
        <option value="mobile">Mobile Money</option>
        <option value="card">Card Payment</option>
    </select><br><br>

    <button type="submit">Place Order</button>
</form>
    </div>
  </div>
 
</div>
 
<!--ADDED JAVASCRIPT-->
<script>
function loadCart() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let total = 0;

    let list = document.getElementById("cart-list");
    list.innerHTML = "";

    cart.forEach(item => {
        total += item.price;

        let li = document.createElement("li");
        li.textContent = item.name + " - P" + item.price;
        list.appendChild(li);
    });

    document.getElementById("items").innerText = "Items selected: " + cart.length;
    document.getElementById("total").innerText = "Total: P" + total;
}

window.onload = loadCart;
</script>
 <button onclick="clearCart()">Clear Cart</button>

<script>
function clearCart() {
    localStorage.removeItem("cart");
    loadCart();
}
</script>
 <script>
function submitOrder(event) {
    event.preventDefault();

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;
    let payment = document.getElementById("payment").value;

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    if (cart.length === 0) {
        alert("Your cart is empty!");
        return;
    }

    let total = 0;
    cart.forEach(item => total += item.price);

    // Simulate order submission
    alert(
        "Order placed!\n\n" +
        "Name: " + name +
        "\nTotal: P" + total +
        "\nPayment: " + payment
    );

    // Clear cart after order
    localStorage.removeItem("cart");
    loadCart();

    // Optional: reset form
    document.querySelector("form").reset();
}
</script>
 
</body>
</html>
