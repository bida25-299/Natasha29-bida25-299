 <head>

<style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
/* HEADER + NAVBAR */
        header {
            background: #333;

            padding: 15px;

            justify-content: space-between;
            align-items: center;
        }
 
        header h1{
            margin:0;
        }
 
        nav  {
            display: flex;

        }
 
        nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;

        }
 
        nav a:hover{
            color:aquamarine;
        }
 
/*MAIN LAYOUT */
        .container {
            display: flex;
            min-height: 100vh;
        }
 
        /* SIDEBAR */
        .sidebar {
            width: 220px;
            background: #f2f2f2;
            padding: 20px;
}
 
        .sidebar a {
            display: block;
            margin-bottom: 10px;
            color: #333;
            text-decoration: none;

             color:aquamarine;

/* MAIN CONTENT */
        .content {
            flex: 1;
            padding: 20px;
        }
 
        .content h1 {
             margin-top: 0;
        }
       
/*NEW FLEX SECTION */
        .main-section {
            display: flex;

        }
 
        /*PRODUCTS*/
        .products-section{
            flex:2;
        }
 
        .product {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ccc;
            padding: 10px 0;

        .price {
            font-weight: bold;
        }
/* CART SUMMARY */
        .cart-summary {
            margin-top: 30px;
            padding: 15px;
            background: #eee;
            width: 250px;
            border-radius: 8px;
        }
/*BUTTON */
        button {
            margin-top: 20px;
            padding: 10px 15px;
            background: #04855c;
            color: white;
            border: none;
            cursor: pointer;
        }
 
        button:hover {
            background: #555;
        }
    </style>
 
</head>
 
<body>
 
<header>
    <h1>Add to cart</h1>
 
      <nav>
        <a href="index.html">Home</a>
        <a href=crocs.html">crocs</a>
        <a href="football jerseys.html">football jerseys</a>
        <a href="about.html">about</a>
        <a href="contact.html">contact</a>
        <a href="feedback.html">feedback</a>
        <a href="cart.html">cart</a>
        
      </nav>
    </header>
 
<div class="container">
 
  <!--SIDEBAR-->
<div class="sidebar">
    <h3>Categories</h3>
    <a href="crocs.html">crocs</a>
    <a href="football jerseys.html">football jerseys</a>
    
</div>
 
<!--CONTENT-->
<div class="content">
    <h1>Select Products</h1>
 
    <!--NEW FLEX WRAPPER-->
    <div class="main-section">
 
        <!--LEFT:PRODUCTS-->
  <div class="products-section">
         
        <div class="product">
            <div class="product-info">
                <h3>classiccrocs-yellow</h3>
                <p class="price">P300</p>
                </div>
                <input type="checkbox" class="item" value="300">
        </div>
 
         <div class="product">
            <div class="product-info">
                <h3>classiccrocs-red</h3>
                <p class="price">P250</p>
                </div>
                <input type="checkbox" class="item" value="250">
         </div>
 
<!--FIXED TYPO HERE-->
         <div class="product">
            <div class="product-info">
                <h3>manchestercity-blue-jersey</h3>
                <p class="price">P350</p>
                </div>
                <input type="checkbox" class="item" value="350">
            </div>
 
            <button type="button" onclick="calculateCart()"> Add Selected to Cart</button>
        </div>
 
<!--RIGHT: CART SUMMARY -->
        <div class="cart-summary">
            <h3> Cart Summary</h3>
            <p id="items">Items selected: 0</p>
            <p id="total">Total:0</p>
         <ul id="cart-list"></ul>
        </div>
 
    </div>
  </div>
 
</div>
 
<!--ADDED JAVASCRIPT-->
<script>
function loadCart() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let total = 0;

    let list = document.getElementById("cart-list");
    list.innerHTML = "";

    cart.forEach(item => {
        total += item.price;

        let li = document.createElement("li");
        li.textContent = item.name + " - P" + item.price;
        list.appendChild(li);
    });

    document.getElementById("items").innerText = "Items selected: " + cart.length;
    document.getElementById("total").innerText = "Total: P" + total;
}

window.onload = loadCart;
</script>
 <button onclick="clearCart()">Clear Cart</button>

<script>
function clearCart() {
    localStorage.removeItem("cart");
    loadCart();
}
</script>
 
</body>
</html>
